<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Page not found (404)</title>
  <style>
    :root {
      --page-bg: #F2EEE3;
      --card-bg: #ffffff;
      --basil: #266533;
      --dark-green: #335a3b;
      --text: #0E0000;
      --muted: #555555;
      --border: #CCE8D4;
      --shadow: rgba(51, 149, 81, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px 16px;
      background: var(--page-bg);
      color: var(--text);
      font-family: "Work Sans", "Helvetica", "Arial", sans-serif;
      text-align: center;
    }

    .error-card {
      width: 100%;
      max-width: 560px;
      padding: 28px 24px;
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: 28px;
      box-shadow: 0 14px 40px var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .error-card::before,
    .error-card::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      background: rgba(38, 101, 51, 0.08);
      pointer-events: none;
    }

    .error-card::before {
      width: 180px;
      height: 180px;
      top: -70px;
      right: -50px;
    }

    .error-card::after {
      width: 120px;
      height: 120px;
      bottom: -45px;
      left: -35px;
    }

    .content {
      position: relative;
      z-index: 1;
    }

    .logo {
      width: 72px;
      height: 72px;
      object-fit: contain;
      display: block;
      margin: 0 auto 16px;
    }

    .chip {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: #F4FBF5;
      color: var(--basil);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .code {
      margin: 16px 0 8px;
      font-size: 84px;
      line-height: 0.95;
      font-weight: 800;
      color: var(--basil);
      font-family: "Nunito", "Helvetica", "Arial", sans-serif;
    }

    h1 {
      margin: 0;
      font-size: 40px;
      line-height: 1.08;
      font-family: "Nunito", "Helvetica", "Arial", sans-serif;
    }

    p {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.65;
      margin: 14px 0 0;
    }

    .support {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 18px;
      background: #FAF9F6;
      border: 1px solid #EEE7D9;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
      justify-content: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
    }

    .btn-primary {
      background: var(--basil);
      color: white;
      box-shadow: 0 8px 20px rgba(38, 101, 51, 0.18);
    }

    .btn-secondary {
      background: #F4FBF5;
      color: var(--basil);
      border: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <section class="error-card">
    <div class="content">
      <img class="logo" src="/tofu-logo.png" alt="Where's My Tofu">
      <div class="chip">404 error</div>
      <div class="code">404</div>
      <h1>The page you were looking for is not here.</h1>
      <p>The link may be outdated, the address may be mistyped, or the page may have moved.</p>
      <div class="actions">
        <a class="btn btn-primary" href="/">Home</a>
        <a class="btn btn-secondary" href="/users/sign_in">Login</a>
      </div>
    </div>
  </section>
</body>
</html>
